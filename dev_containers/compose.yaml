name: webswarm-dev

services:
  db:
    image: postgres:18
    container_name: webswarm-db
    env_file: ../worker/.env
    ports:
      - "5432:5432"
    volumes:
      - webswarm_pgdata:/var/lib/postgresql
      - ./jobs_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  pgbouncer:
    build: ../pgbouncer
    container_name: webswarm-pgbouncer
    env_file: ../pgbouncer/.env
    ports:
      - "6432:6432"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  webswarm_pgdata: